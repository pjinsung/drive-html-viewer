<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
iframe { width: 100%; height: 100%; border: 0; }
</style>
</head>
<body>
<script>
(() => {
  let activeBlobUrl = null;

  function stripMetaCsp(html) {
    return html.replace(/<meta[^>]*http-equiv\s*=\s*["']?content-security-policy(?:-report-only)?["']?[^>]*>/gi, '');
  }

  function injectBase(html, baseUrl) {
    if (!baseUrl || /<base[\s>]/i.test(html)) return html;
    const baseTag = '<base href="' + baseUrl.replace(/"/g, '&quot;') + '">';
    if (/<head[\s>]/i.test(html)) return html.replace(/<head([^>]*)>/i, '<head$1>' + baseTag);
    if (/<html[\s>]/i.test(html)) return html.replace(/<html([^>]*)>/i, '<html$1><head>' + baseTag + '</head>');
    return '<head>' + baseTag + '</head>' + html;
  }

  function render(html, baseUrl) {
    const finalHtml = injectBase(stripMetaCsp(html), baseUrl);
    const nextBlobUrl = URL.createObjectURL(new Blob([finalHtml], { type: 'text/html;charset=utf-8' }));
    const frame = document.createElement('iframe');
    frame.src = nextBlobUrl;
    frame.addEventListener('load', () => {
      if (activeBlobUrl) URL.revokeObjectURL(activeBlobUrl);
      activeBlobUrl = nextBlobUrl;
    }, { once: true });
    document.body.replaceChildren(frame);
  }

  window.addEventListener('message', (event) => {
    if (event.source !== window.parent) return;
    if (event.data?.type !== 'render') return;
    render(event.data.html, event.data.baseUrl);
  });

  window.parent.postMessage({ type: 'ready' }, '*');
})();
</script>
</body>
</html>
